    transform: translate(-50%, -50%);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;

    box-shadow: 0 16px 64px rgba(0,0,0,0.6);

</style>
</head>

  cat.items.forEach(s => {
    const imgFile = imgMap[s.n] || "Screw_Head_-_Phillips.svg";
    const isPhoto = [23,24,25,28,30].includes(s.n);
    const imgUrl = W + imgFile + (isPhoto ? "?width=120" : SZ);
    const eName = s.name.replace(/'/g, "\\'");
    html += `
      <div class="screw-card"${isPhoto ? ' data-photo="true"' : ''}>
        <div class="screw-img" onclick="showTooltip('${eName}')">
          <img src="${imgUrl}" alt="${s.name}" loading="lazy"
               onerror="this.style.display='none';this.nextElementSibling.style.display='block';">
          <div class="fallback" style="display:none">No img</div>
        </div>
        <div class="screw-info">
          <div class="screw-title">
            <span class="screw-num">#${s.n}</span>
            <span class="screw-name">${s.name}</span>
          </div>
          <div class="screw-meta">
            <div><span class="label">LOOK</span> ${s.look}</div>
            <div><span class="label">USE</span> ${s.use}</div>
            <div><span class="label">KEY</span> ${s.key}</div>
            <div>
              <span class="tag tag-mat">${s.mat}</span>
              <span class="tag tag-size">${s.size}</span>
            </div>
          </div>
        </div>
      </div>`;
  });
  html += '</div></div>';
});

// Tips
html += `
<div class="tips">
  <h3>Key Tips for Cybersecurity Hardware Analysis</h3>
  <ul>
    <li><strong>Security screws</strong> (Torx Security, Pentalobe, Tri-Wing, Tri-Point, Spanner) deter unauthorized physical access. Identifying them is the first step in hardware pentesting.</li>
    <li><strong>JIS vs Phillips</strong>: Japanese electronics use JIS screws — look for a dot on the head. Using a Phillips driver will cause cam-out and stripping.</li>
    <li><strong>Thread-locking</strong>: Blue = removable (Loctite 242). Red = permanent (Loctite 271). Heat above 250°C breaks red thread-lock.</li>
    <li><strong>M.2 SSD screws</strong> (M2×3mm) are the #1 most commonly lost screw in PC building — always keep spares.</li>
    <li><strong>Nylon/PEEK screws</strong> provide electrical isolation — used where ESD protection is critical.</li>
    <li><strong>Wrong standoffs</strong> under a motherboard can short PCB traces and prevent POST.</li>
  </ul>
</div>`;

// Footer
html += `
<div class="footer">
  <p>Top 40 Screw Head Types — Illustrated Study Guide for Electronics & Cybersecurity</p>
  <p>Drive recess diagrams from <a href="https://commons.wikimedia.org/wiki/Category:Drawings_of_screw_heads" target="_blank">Wikimedia Commons</a> (CC0/CC-BY-SA/Public Domain)</p>
</div>`;

container.innerHTML = html;

function closeTooltip() {
  document.querySelectorAll('.tooltip-overlay, .img-tooltip').forEach(el => el.remove());
}

function showTooltip(name) {
  closeTooltip();

  // Find the clicked card's image src and get a larger version
  const cards = document.querySelectorAll('.screw-card');
  let imgSrc = '';
  cards.forEach(card => {
    if (card.querySelector('.screw-name')?.textContent === name) {
      const img = card.querySelector('.screw-img img');
      if (img) imgSrc = img.src.replace(/\?width=\d+/, '?width=400');
    }
  });

  const googleUrl = 'https://www.google.com/search?tbm=isch&q=' + encodeURIComponent(name + ' screw head');

  const overlay = document.createElement('div');
  overlay.className = 'tooltip-overlay';
  overlay.onclick = closeTooltip;

  const tip = document.createElement('div');
  tip.className = 'img-tooltip';
  tip.innerHTML = `
    <div class="tt-header">
      <span class="tt-name">${name}</span>
      <button class="tt-close" onclick="closeTooltip()">&times;</button>
    </div>
    <img class="tt-preview" src="${imgSrc}" alt="${name}" onerror="this.style.display='none'">
    <a class="tt-google" href="${googleUrl}" target="_blank" rel="noopener">
      Search Google Images &rarr;
    </a>
  `;
  document.body.appendChild(overlay);
  document.body.appendChild(tip);
}
</script>
